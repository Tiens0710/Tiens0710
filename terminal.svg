      0%, 88.8% { opacity: 0; }
      88.9% { opacity: 1; }
      50% { opacity: 1; }
      51% { opacity: 0; }
      100% { opacity: 0; }
    }
    .cursor {
      fill: #39ff14;
      animation: cursor-blink 1s step-end infinite;
