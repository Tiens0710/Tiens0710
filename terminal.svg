  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
    * { box-sizing: border-box; }
    .terminal-bg { fill: #0d1117; }
    .line-wrap {
      overflow: hidden;
      white-space: nowrap;
      display: inline-block;
    }
    .cmd { fill: #39ff14; font-weight: 700; }
    .out { fill: #8b949e; }
