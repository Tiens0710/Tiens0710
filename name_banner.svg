    <circle cx="232.1" cy="20.0" class="led" style="animation-delay:3.57s"/>
    <circle cx="264.4" cy="20.0" class="led" style="animation-delay:0.35s"/>
    <circle cx="296.8" cy="20.0" class="led" style="animation-delay:1.69s"/>
    <circle cx="329.1" cy="20.0" class="led" style="animation-delay:0.12s"/>
    <circle cx="361.5" cy="20.0" class="led" style="animation-delay:0.87s"/>
    <circle cx="393.8" cy="20.0" class="led" style="animation-delay:2.02s"/>
    <circle cx="426.2" cy="20.0" class="led" style="animation-delay:0.11s"/>
    <circle cx="458.5" cy="20.0" class="led" style="animation-delay:0.80s"/>
    <circle cx="490.9" cy="20.0" class="led" style="animation-delay:2.60s"/>
    <circle cx="523.2" cy="20.0" class="led" style="animation-delay:2.18s"/>
    <circle cx="555.6" cy="20.0" class="led" style="animation-delay:0.88s"/>
    <circle cx="587.9" cy="20.0" class="led" style="animation-delay:2.36s"/>
    <circle cx="620.3" cy="20.0" class="led" style="animation-delay:3.24s"/>
    <circle cx="652.6" cy="20.0" class="led" style="animation-delay:0.03s"/>
    <circle cx="685.0" cy="20.0" class="led" style="animation-delay:3.22s"/>
    <circle cx="717.3" cy="20.0" class="led" style="animation-delay:2.79s"/>
    <circle cx="749.7" cy="20.0" class="led" style="animation-delay:1.36s"/>
    <circle cx="782.0" cy="20.0" class="led" style="animation-delay:1.07s"/>

    <circle cx="800.0" cy="38.0" class="led" style="animation-delay:0.62s"/>
    <circle cx="800.0" cy="80.0" class="led" style="animation-delay:3.83s"/>
    <circle cx="800.0" cy="122.0" class="led" style="animation-delay:2.59s"/>

    <circle cx="782.0" cy="140.0" class="led" style="animation-delay:1.35s"/>
    <circle cx="749.7" cy="140.0" class="led" style="animation-delay:0.37s"/>
    <circle cx="717.3" cy="140.0" class="led" style="animation-delay:0.39s"/>
    <circle cx="685.0" cy="140.0" class="led" style="animation-delay:3.39s"/>
    <circle cx="652.6" cy="140.0" class="led" style="animation-delay:2.41s"/>
