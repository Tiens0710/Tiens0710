<svg width="820" height="160" viewBox="0 0 820 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="9" result="blur2"/>
      <feGaussianBlur stdDeviation="20" result="blur3"/>
      <feGaussianBlur stdDeviation="36" result="blur4"/>
      <feMerge>
        <feMergeNode in="blur4"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowFrame" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="9" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowDot" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3.5" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gradPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00fff0"/>
      <stop offset="50%" stop-color="#1affd9"/>
      <stop offset="100%" stop-color="#00e0c0"/>
    </linearGradient>
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dfff5"/>
      <stop offset="50%" stop-color="#2bffe0"/>
      <stop offset="100%" stop-color="#00ffc8"/>
    </linearGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.06"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700;900&amp;display=swap');

      @keyframes flicker {
        0%   { opacity: 1; }
        2%   { opacity: 0.4; }
        4%   { opacity: 1; }
        8%   { opacity: 1; }
        9%   { opacity: 0.3; }
        10%  { opacity: 1; }
        70%  { opacity: 1; }
        72%  { opacity: 0.5; }
        74%  { opacity: 1; }
        100% { opacity: 1; }
      }
      @keyframes glitchShift {
        0%, 90%, 100% { transform: translate(0,0); }
        91% { transform: translate(-2px, 1px); }
        92% { transform: translate(2px, -1px); }
        93% { transform: translate(0,0); }
      }
      @keyframes framePulse {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }
      @keyframes ledTwinkle {
        0%, 100% { opacity: 0.35; r: 2.2; }
        50% { opacity: 1; r: 3.2; }
      }

      .layer-back {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-weight: 900;
        font-size: 46px;
        letter-spacing: 4px;
        fill: url(#gradPink);
        filter: url(#glow);
        opacity: 0.7;
        animation: glitchShift 5s infinite;
      }
      .layer-front {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-weight: 900;
        font-size: 46px;
        letter-spacing: 4px;
        fill: url(#gradCyan);
        filter: url(#glow);
        animation: flicker 4s infinite;
      }
      .neon-frame {
        fill: none;
        stroke: #1affd9;
        stroke-width: 1.8;
        filter: url(#glowFrame);
        animation: framePulse 3s infinite ease-in-out;
      }
      .led {
        fill: #c0fff5;
        filter: url(#glowDot);
        animation: ledTwinkle 3s infinite ease-in-out;
      }
    </style>
  </defs>

  <rect width="820" height="160" fill="#05010a"/>

  <!-- thin neon outline -->
  <rect x="20" y="20" width="780" height="120" rx="18" class="neon-frame"/>

  <!-- LED dots running along the border -->
  <g>
    <circle cx="38.0" cy="20.0" class="led" style="animation-delay:2.56s"/>
    <circle cx="70.3" cy="20.0" class="led" style="animation-delay:0.10s"/>
    <circle cx="102.7" cy="20.0" class="led" style="animation-delay:1.10s"/>
    <circle cx="135.0" cy="20.0" class="led" style="animation-delay:0.89s"/>
