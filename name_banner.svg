<svg width="820" height="160" viewBox="0 0 820 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feGaussianBlur stdDeviation="14" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowFrame" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="8" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gradPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="50%" stop-color="#39ff14"/>
      <stop offset="100%" stop-color="#0aff9d"/>
    </linearGradient>
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#aaff00"/>
      <stop offset="50%" stop-color="#5cff1f"/>
      <stop offset="100%" stop-color="#00ffb3"/>
    </linearGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.06"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700;900&amp;display=swap');
      @keyframes flicker {
        0%   { opacity: 1; }
        2%   { opacity: 0.4; }
        4%   { opacity: 1; }
        8%   { opacity: 1; }
        9%   { opacity: 0.3; }
        10%  { opacity: 1; }
        70%  { opacity: 1; }
        72%  { opacity: 0.5; }
        74%  { opacity: 1; }
        100% { opacity: 1; }
      }
      @keyframes frameFlicker {
        0%   { opacity: 1; }
        3%   { opacity: 0.5; }
        6%   { opacity: 1; }
        45%  { opacity: 1; }
        47%  { opacity: 0.6; }
        49%  { opacity: 1; }
        100% { opacity: 1; }
      }
      @keyframes glitchShift {
        0%, 90%, 100% { transform: translate(0,0); }
        91% { transform: translate(-2px, 1px); }
        92% { transform: translate(2px, -1px); }
        93% { transform: translate(0,0); }
      }
      .layer-back {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-weight: 900;
        font-size: 46px;
        letter-spacing: 4px;
        fill: url(#gradPink);
        filter: url(#glow);
        opacity: 0.7;
        animation: glitchShift 5s infinite;
      }
      .layer-front {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-weight: 900;
        font-size: 46px;
        letter-spacing: 4px;
        fill: url(#gradCyan);
        filter: url(#glow);
        animation: flicker 4s infinite;
      }
      .neon-frame {
        fill: none;
        stroke: #39ff14;
        stroke-width: 3;
        filter: url(#glowFrame);
        animation: frameFlicker 4.5s infinite;
      }
      .neon-frame-inner {
        fill: none;
        stroke: #aaff66;
        stroke-width: 1.5;
        filter: url(#glowFrame);
        animation: frameFlicker 4.5s infinite;
      }
    </style>
  </defs>
  <rect width="820" height="160" fill="#05010a"/>

  <!-- Neon sign frame -->
  <rect x="20" y="20" width="780" height="120" rx="18" class="neon-frame"/>
  <rect x="28" y="28" width="764" height="104" rx="12" class="neon-frame-inner"/>

  <!-- corner bolts like a real sign -->
  <circle cx="36" cy="36" r="4" fill="#39ff14" filter="url(#glowFrame)" opacity="0.8"/>
  <circle cx="784" cy="36" r="4" fill="#39ff14" filter="url(#glowFrame)" opacity="0.8"/>
  <circle cx="36" cy="124" r="4" fill="#39ff14" filter="url(#glowFrame)" opacity="0.8"/>
  <circle cx="784" cy="124" r="4" fill="#39ff14" filter="url(#glowFrame)" opacity="0.8"/>

  <text x="412" y="92" text-anchor="middle" class="layer-back">Nguyen Nhat Tien</text>
  <text x="410" y="92" text-anchor="middle" class="layer-front">Nguyen Nhat Tien</text>

  <rect width="820" height="160" fill="url(#scan)"/>
</svg>
