    <circle cx="587.9" cy="140.0" class="led" style="animation-delay:2.92s"/>
    <circle cx="555.6" cy="140.0" class="led" style="animation-delay:2.14s"/>
    <circle cx="523.2" cy="140.0" class="led" style="animation-delay:3.89s"/>
    <circle cx="490.9" cy="140.0" class="led" style="animation-delay:1.51s"/>
    <circle cx="458.5" cy="140.0" class="led" style="animation-delay:2.21s"/>
    <circle cx="426.2" cy="140.0" class="led" style="animation-delay:3.32s"/>
    <circle cx="393.8" cy="140.0" class="led" style="animation-delay:2.47s"/>
    <circle cx="361.5" cy="140.0" class="led" style="animation-delay:3.45s"/>
    <circle cx="329.1" cy="140.0" class="led" style="animation-delay:2.31s"/>
    <circle cx="296.8" cy="140.0" class="led" style="animation-delay:2.82s"/>
    <circle cx="264.4" cy="140.0" class="led" style="animation-delay:0.18s"/>
    <circle cx="232.1" cy="140.0" class="led" style="animation-delay:0.91s"/>
    <circle cx="199.7" cy="140.0" class="led" style="animation-delay:1.16s"/>
    <circle cx="167.4" cy="140.0" class="led" style="animation-delay:0.32s"/>
    <circle cx="135.0" cy="140.0" class="led" style="animation-delay:0.93s"/>
    <circle cx="102.7" cy="140.0" class="led" style="animation-delay:0.40s"/>
    <circle cx="70.3" cy="140.0" class="led" style="animation-delay:1.11s"/>
    <circle cx="38.0" cy="140.0" class="led" style="animation-delay:0.68s"/>

    <circle cx="20.0" cy="122.0" class="led" style="animation-delay:2.54s"/>
    <circle cx="20.0" cy="80.0" class="led" style="animation-delay:1.46s"/>
    <circle cx="20.0" cy="38.0" class="led" style="animation-delay:1.48s"/>
  </g>

  <text x="412" y="92" text-anchor="middle" class="layer-back">Nguyen Nhat Tien</text>
  <text x="410" y="92" text-anchor="middle" class="layer-front">Nguyen Nhat Tien</text>

  <rect width="820" height="160" fill="#00fff0" opacity="0.04"/>
  <rect width="820" height="160" fill="url(#scan)"/>
</svg>
