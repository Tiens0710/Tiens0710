<svg width="820" height="100" viewBox="0 0 820 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="50%" stop-color="#39ff14"/>
      <stop offset="100%" stop-color="#00ff9d"/>
    </linearGradient>
    <style>
      @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
        20%, 24%, 55% { opacity: 0.85; }
      }
      .neon-text {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-weight: 900;
        font-size: 46px;
        fill: url(#grad);
        filter: url(#glow);
        animation: flicker 4s infinite;
      }
    </style>
  </defs>
  <rect width="820" height="100" fill="#0d1117"/>
  <text x="410" y="62" text-anchor="middle" class="neon-text">Nguyen Nhat Tien</text>
</svg>
