<svg width="780" height="110" viewBox="0 0 780 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ddc84" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1b5e20" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3ddc84"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="780" height="110" rx="12" fill="#0d1117"/>
  <rect width="780" height="110" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="778" height="108" rx="11" fill="none" stroke="url(#border)" stroke-width="1.5"/>
  <!-- label badge -->
  <rect x="24" y="20" width="60" height="22" rx="6" fill="#3ddc84" opacity="0.2"/>
  <rect x="24" y="20" width="60" height="22" rx="6" fill="none" stroke="#3ddc84" stroke-width="1"/>
  <text x="54" y="35" font-family="Fira Code, monospace" font-size="11" fill="#3ddc84" text-anchor="middle" font-weight="700">ODOO</text>
  <!-- title -->
  <text x="24" y="68" font-family="Fira Code, monospace" font-weight="800" font-size="19" fill="#e6f1ff">Smart Farm Management System</text>
  <!-- tech -->
  <text x="24" y="86" font-family="Fira Code, monospace" font-size="12" fill="#3ddc84" opacity="0.9">Odoo  Python  XML  PostgreSQL</text>
  <!-- desc -->
  <text x="24" y="102" font-family="Fira Code, monospace" font-size="11" fill="#7d8590">Google Maps farm visualization — Anabas Joint Stock Company</text>
</svg>